version: 2

models:

  - name: stg_agents
    columns:
      - name: agent_id
        tests:
          - unique
          - not_null
      - name: full_name
        tests:
          - not_null
      - name: team_id
        tests:
          - not_null
      - name: role
        tests:
          - not_null
      - name: is_active
        tests:
          - not_null

  - name: stg_clients
    columns:
      - name: client_id
        tests:
          - unique
          - not_null
      - name: client_name
        tests:
          - not_null
      - name: client_type
        tests:
          - not_null
      - name: contract_tier
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Standard', 'Premium', 'Enterprise']
                quote: true
      - name: region
        tests:
          - not_null
      - name: is_active
        tests:
          - not_null

  - name: stg_priority_levels
    columns:
      - name: priority_id
        tests:
          - unique
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4]
                quote: false
      - name: priority_label
        tests:
          - not_null

  - name: stg_ticket_categories
    columns:
      - name: category_id
        tests:
          - unique
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
                quote: false
      - name: category_name
        tests:
          - not_null

  - name: stg_sla_definitions
    columns:
      - name: sla_id
        tests:
          - unique
          - not_null
      - name: contract_tier
        tests:
          - not_null
      - name: priority_id
        tests:
          - not_null

  - name: stg_escalation_log
    columns:
      - name: escalation_id
        tests:
          - unique
          - not_null
      - name: ticket_id
        tests:
          - not_null

  - name: stg_ticket_audit_log
    columns:
      - name: log_id
        tests:
          - unique
          - not_null
      - name: ticket_id
        tests:
          - not_null

  - name: stg_tickets
    columns:

      - name: ticket_id
        tests:
          - unique
          - not_null

      - name: ticket_reference
        tests:
          - unique
          - not_null

      - name: client_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_clients')
                field: client_id
          - not_null

      - name: assigned_agent_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_agents')
                field: agent_id
          - not_null

      - name: category_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_ticket_categories')
                field: category_id
          - not_null

      - name: priority_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_priority_levels')
                field: priority_id
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4]
                quote: false

      - name: status
        tests:
          - not_null

      - name: sla_breached
        tests:
          - not_null

      - name: created_at
        tests:
          - not_null

      - name: channel
        tests:
          - not_null

      - name: description
        tests:
          - not_null

      - name: resolution_notes
        tests: []  # No tests - can be NULL for open tickets