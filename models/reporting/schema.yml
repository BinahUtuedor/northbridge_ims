version: 2

models:

  # ============================================================================
  # DIMENSIONS
  # ============================================================================

  - name: dim_agents
    description: "Agent dimension containing workforce attributes and capacity segmentation."
    columns:
      - name: agent_id
        tests:
          - unique
          - not_null

  - name: dim_clients
    description: "Client dimension containing contract and commercial attributes."
    columns:
      - name: client_id
        tests:
          - unique
          - not_null

  - name: dim_priority
    description: "Ticket priority lookup dimension (P1–P4)."
    columns:
      - name: priority_id
        tests:
          - unique
          - not_null

  - name: dim_ticket_category
    description: "Ticket category classification dimension."
    columns:
      - name: category_id
        tests:
          - unique
          - not_null

  - name: dim_sla
    description: "SLA rules mapping contract tier and priority to service targets."
    columns:
      - name: sla_id
        tests:
          - unique
          - not_null

  - name: dim_date
    description: "Standard calendar dimension with fiscal and reporting attributes."
    columns:
      - name: date_key
        tests:
          - unique
          - not_null

  # ============================================================================
  # FACT TABLES
  # ============================================================================

  - name: fct_tickets
    description: "Core fact table for ticket lifecycle, SLA tracking and operational performance."
    columns:
      - name: ticket_id
        tests:
          - unique
          - not_null

      - name: client_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_clients')
                field: client_id

      - name: agent_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_agents')
                field: agent_id

      - name: priority_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_priority')
                field: priority_id

      - name: category_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_ticket_category')
                field: category_id

  - name: fct_ticket_audit
    description: "Event-level audit log of ticket lifecycle changes."
    columns:
      - name: log_id
        tests:
          - unique
          - not_null

  - name: fct_escalations
    description: "Escalation events with operational risk tracking."
    columns:
      - name: escalation_id
        tests:
          - unique
          - not_null

  # ============================================================================
  # REPORTING MARTS
  # ============================================================================

  - name: rpt_sla_kpis
    description: "Executive SLA KPI dashboard aggregated by time, priority and contract tier."
    columns:
      - name: total_tickets
        tests:
          - not_null

      - name: sla_breach_percentage
        description: "Percentage of tickets breaching SLA thresholds."

  - name: rpt_agent_performance
    description: "Agent productivity, SLA compliance, and workload distribution metrics."
    columns:
      - name: agent_id
        tests:
          - unique
          - not_null

  - name: rpt_client_sla
    description: "Client-level SLA performance and operational health metrics."
    columns:
      - name: client_id
        tests:
          - unique
          - not_null

  - name: rpt_ticket_summary
    description: "Operational ticket summary by time, category, priority and status."