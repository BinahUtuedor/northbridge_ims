version: 2

models:

  # =========================
  # DIMENSIONS
  # =========================

  - name: dim_agents
    columns:
      - name: agent_id
        tests:
          - unique
          - not_null

  - name: dim_clients
    columns:
      - name: client_id
        tests:
          - unique
          - not_null

  - name: dim_priority
    columns:
      - name: priority_id
        tests:
          - unique
          - not_null

  - name: dim_ticket_category
    columns:
      - name: category_id
        tests:
          - unique
          - not_null

  - name: dim_sla
    columns:
      - name: sla_id
        tests:
          - unique
          - not_null

  - name: dim_date
    columns:
      - name: date_key
        tests:
          - unique
          - not_null

  # =========================
  # FACT TABLES
  # =========================

  - name: fct_tickets
    columns:

      - name: ticket_id
        tests:
          - unique
          - not_null

      - name: client_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_clients')
                field: client_id

      - name: agent_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_agents')
                field: agent_id

      - name: priority_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_priority')
                field: priority_id

      - name: category_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_ticket_category')
                field: category_id

  - name: fct_ticket_audit
    columns:
      - name: log_id
        tests:
          - unique
          - not_null

  - name: fct_escalations
    columns:
      - name: escalation_id
        tests:
          - unique
          - not_null

  # =========================
  # REPORTING TABLES
  # =========================

  - name: rpt_sla_kpis
    columns:
      - name: total_tickets
        tests:
          - not_null

      - name: sla_breach_percentage
        tests:
          - not_null

  - name: rpt_agent_performance
    columns:
      - name: agent_id
        tests:
          - unique
          - not_null

  - name: rpt_client_sla
    columns:
      - name: client_id
        tests:
          - unique
          - not_null

  - name: rpt_ticket_summary
    columns:
      - name: ticket_id
        tests:
          - not_null