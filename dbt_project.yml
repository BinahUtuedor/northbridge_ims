name: 'northbridge_ims'
version: '1.0'
config-version: 2

profile: 'northbridge_ims'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

clean-targets:
  - "target"
  - "dbt_packages"

models:

  northbridge_ims:

    staging:
      +materialized: view
      +schema: staging
      +docs:
        node_color: "#A3C9A8"
      +persist_docs:
        relation: true
        columns: true

    reporting:
      +materialized: table
      +schema: reporting
      +docs:
        node_color: "#6FA8DC"
      +persist_docs:
        relation: true
        columns: true

      facts:
        +materialized: table

      dimensions:
        +materialized: table

      marts:
        +materialized: table